<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to the exam registration website.">
    <title>Exam Registration | Log In</title>
    <link rel="icon" type="image/png" href="images/LOGO.png">
    <link rel="stylesheet" href="css/base.css?v=5">
    <link rel="stylesheet" href="css/login.css?v=3">
    <script src="js/app.js?v=21" defer></script>
</head>
<body data-page="login">
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header>
        <nav aria-label="Primary navigation">
            <a class="logo" href="index.html" aria-label="Exam Registration home">
                <img src="images/logo_0_0.webp" alt="">
                <span>Exam Registration</span>
            </a>
        </nav>
    </header>

    <main id="main-content" class="login-main">
        <section class="login-card" aria-labelledby="login-heading">
            <h1 id="login-heading">Log In</h1>
            <p>Use one of the test accounts below.</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="btn">Log In</button>
                <p id="login-message" role="status" aria-live="polite"></p>
            </form>

            <section class="test-accounts" aria-labelledby="accounts-heading">
                <h2 id="accounts-heading">Test Accounts</h2>
                <dl>
                    <div>
                        <dt>Student</dt>
                        <dd>student@examregistration.test</dd>
                        <dd>Password: Student123</dd>
                    </div>
                    <div>
                        <dt>Faculty</dt>
                        <dd>faculty@examregistration.test</dd>
                        <dd>Password: Faculty123</dd>
                    </div>
                </dl>
            </section>
        </section>
    </main>

    <footer>
        <p>
            &copy; 2026 Exam Registration. All rights reserved. |
            <a href="https://github.com/Javicshz/CIT_260_CSN_Exam_Website" target="_blank" rel="noopener noreferrer">
                GitHub Repository
            </a>
        </p>
    </footer>
</body>
</html>
